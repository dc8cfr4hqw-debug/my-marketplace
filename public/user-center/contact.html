<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>(function(){var m=document.cookie.match(/(?:^|;\s*)theme=([^;]+)/);var t=m?decodeURIComponent(m[1]):"is_dark";if(t!=="is_dark"&&t!=="is_light")t="is_dark";document.documentElement.classList.add(t);})();</script>
  <style>html.is_dark,html.is_dark body{background:#05070c!important;color:#e7eef8;}html.is_light,html.is_light body{background:#ffffff!important;}</style>
  <title>Neura | Contact</title>
  <link rel="stylesheet" href="/app/dist/app.css" />
  <link rel="stylesheet" href="/app/dist/magnific-popup.css" />
  <link rel="shortcut icon" href="/assets/images/logo/favicon.png" />
  <style>
    .c-page { padding:34px 0 56px; }
    .c-shell { display:grid; grid-template-columns:260px 1fr; gap:24px; }
    .c-sidebar, .c-card { background: rgba(17,25,40,.55); border:1px solid rgba(148,163,184,.22); border-radius:16px; backdrop-filter: blur(8px); }
    .c-sidebar { padding:14px; position:sticky; top:110px; height:max-content; }
    .c-sidebar a { display:block; color:#ced8ea; text-decoration:none; font-weight:600; font-size:15px; padding:10px 12px; border-radius:10px; margin-bottom:6px; }
    .c-sidebar a.active, .c-sidebar a:hover { background:#1a2334; color:#fff; }
    .c-main { display:grid; gap:18px; }
    .c-card { padding:22px; }
    .c-grid { display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:14px; margin-top:14px; }
    .c-item { border:1px solid rgba(99,122,158,.32); border-radius:14px; padding:16px; background:rgba(11,19,30,.4); }
    .c-item i { color:#5ca5ff; margin-right:8px; }
    .c-label { color:#9eb0ca; font-size:13px; margin-bottom:4px; }
    .c-value { font-size:16px; font-weight:700; }
    .c-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .c-input, .c-text { width:100%; border:1px solid #31455f; border-radius:10px; background:#131c2a; color:#e5eef9; padding:10px 12px; }
    .c-text { min-height:120px; resize:vertical; }
    body.is_light .c-sidebar, body.is_light .c-card { background:rgba(255,255,255,.92); border-color:#d8e1ef; }
    body.is_light .c-sidebar a { color:#334155; }
    body.is_light .c-sidebar a.active, body.is_light .c-sidebar a:hover { background:#eaf1ff; color:#0f172a; }
    body.is_light .c-item { background:#fff; border-color:#d8e2f0; }
    body.is_light .c-input, body.is_light .c-text { background:#fff; color:#0f172a; border-color:#cad8ea; }
    @media (max-width:1199px){ .c-shell { grid-template-columns:1fr; } .c-sidebar { position:static; } }
    @media (max-width:900px){ .c-grid, .c-form-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body class="body header-fixed">
  <header id="header_main" class="header">
    <div class="container-fluid">
      <div class="row"><div class="col-12">
        <div class="header__body d-flex justify-content-between">
          <div class="header__left">
            <div class="logo">
              <a class="light" href="/index.html"><img id="site-logo" src="/assets/images/logo/logo-dark.png" alt="Neura" width="148" height="38" /></a>
              <a class="dark" href="/index.html"><img src="/assets/images/logo/logo-dark.png" alt="Neura" width="148" height="38" /></a>
            </div>
            <div class="left__main">
              <nav id="main-nav" class="main-nav">
                <ul id="menu-primary-menu" class="menu">
                  <li class="menu-item"><a href="/user-center/assets/deposit/fiat.html">Deposit</a></li>
                  <li class="menu-item"><a href="/markets.html">Markets</a></li>
                  <li class="menu-item"><a href="/blog-default.html">News</a></li>
                </ul>
              </nav>
            </div>
          </div>
          <div class="header__right"></div>
        </div>
      </div></div>
    </div>
  </header>

  <section class="c-page">
    <div class="container">
      <div class="c-shell">
        <aside class="c-sidebar">
          <a href="/user-center/assets/dashboard.html"><i class="fa-solid fa-chart-pie" style="margin-right:8px;"></i>Asset Overview</a>
          <a href="/user-center/assets/deposit/fiat.html"><i class="fa-solid fa-wallet" style="margin-right:8px;"></i>Crypto Deposit</a>
          <a href="/user-center/withdrawals.html"><i class="fa-solid fa-money-bill-transfer" style="margin-right:8px;"></i>Withdrawals</a>
          <a href="/user-center/customer-advisors.html"><i class="fa-solid fa-headset" style="margin-right:8px;"></i>Financial Advisors</a>
          <a class="active" href="/user-center/contact.html"><i class="fa-regular fa-envelope" style="margin-right:8px;"></i>Contact</a>
          <a href="/markets.html"><i class="fa-solid fa-chart-line" style="margin-right:8px;"></i>Markets</a>
          <a href="/user-center/profile-page.html"><i class="fa-solid fa-user" style="margin-right:8px;"></i>Profile</a>
        </aside>
        <main class="c-main">
          <div class="c-card">
            <h3 class="heading" style="margin-top:0;">Contact Neura</h3>
            <div class="c-grid">
              <div class="c-item"><div class="c-label"><i class="fa-solid fa-envelope"></i>Email</div><div class="c-value">support@neura-wallet.com</div></div>
              <div class="c-item"><div class="c-label"><i class="fa-solid fa-phone"></i>Phone</div><div class="c-value">+1 (800) 555-0112</div></div>
              <div class="c-item"><div class="c-label"><i class="fa-solid fa-clock"></i>Hours</div><div class="c-value">24/7 for urgent account issues</div></div>
            </div>
          </div>
          <div class="c-card">
            <h4 style="margin-top:0;">Send a message</h4>
            <div class="c-form-grid">
              <input class="c-input" type="text" placeholder="Full name" />
              <input class="c-input" type="email" placeholder="Email address" />
            </div>
            <textarea class="c-text" placeholder="Tell us what you need help with"></textarea>
            <button class="btn-action" type="button">Send Message</button>
          </div>
        </main>
      </div>
    </div>
  </section>

  <script src="/app/js/jquery.min.js"></script>
  <script src="/app/js/popper.min.js"></script>
  <script src="/app/js/bootstrap.min.js"></script>
  <script src="/app/js/app.js"></script>
  <script src="/app/js/protected.js"></script>
</body>
</html>
